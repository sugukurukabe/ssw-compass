<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none';"
    />
    <title>SSW Compass — Procedure</title>
    <style>
      :root {
        --ssw-fg: var(--color-text-primary, #111);
        --ssw-fg-muted: var(--color-text-secondary, #555);
        --ssw-bg: var(--color-bg-primary, #fff);
        --ssw-bg-muted: var(--color-bg-secondary, #f6f6f6);
        --ssw-bg-skeleton: var(--color-bg-tertiary, #f0f0f0);
        --ssw-bg-skeleton-shine: var(--color-bg-secondary, #e0e0e0);
        --ssw-accent: var(--color-accent, #0a2540);
        --ssw-border: var(--color-border, #e5e7eb);
        --ssw-disclaimer-bg: var(--color-info-bg, #fffbeb);
        --ssw-disclaimer-fg: var(--color-info-text, #713f12);
        --ssw-font: var(--font-family-body, -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif);
      }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--ssw-bg);
        color: var(--ssw-fg);
        font-family: var(--ssw-font);
        font-size: 14px;
        line-height: 1.6;
      }
      #root {
        padding: 16px;
      }
      .notice-l1 {
        display: block;
        color: var(--ssw-fg-muted);
        font-size: 12px;
        padding: 4px 0 12px;
      }
      .decision {
        background: var(--ssw-bg);
        border: 1px solid var(--ssw-border);
        border-left: 4px solid var(--ssw-accent);
        border-radius: 8px;
        padding: 14px 16px;
        margin: 8px 0 12px;
        transition: opacity 200ms ease-out, transform 200ms ease-out;
      }
      .decision h3 {
        margin: 0 0 8px;
        font-size: 15px;
        font-weight: 700;
        color: var(--ssw-accent);
      }
      .decision p.rationale {
        margin: 0 0 10px;
      }
      .decision ol.next-steps {
        margin: 0 0 4px;
        padding-left: 20px;
      }
      .decision ol.next-steps li {
        margin-bottom: 4px;
      }
      .classifier-step {
        border-top: 1px solid var(--ssw-border);
        padding-top: 10px;
        margin-top: 10px;
      }
      .classifier-step h4,
      .result-panel h4 {
        margin: 0 0 8px;
        font-size: 13px;
        color: var(--ssw-fg-muted);
      }
      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .chip,
      .primary-action,
      .secondary-action {
        min-height: 44px;
        border: 1px solid var(--ssw-border);
        border-radius: 999px;
        background: var(--ssw-bg-muted);
        color: var(--ssw-fg);
        padding: 8px 12px;
        font: inherit;
        cursor: pointer;
      }
      .chip--selected,
      .primary-action {
        background: var(--ssw-accent);
        border-color: var(--ssw-accent);
        color: #fff;
      }
      .chip:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .result-panel {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        background: var(--ssw-bg-muted);
      }
      .result-panel ul {
        margin: 0;
        padding-left: 18px;
      }
      .omission {
        margin: 8px 0 0;
        color: var(--ssw-fg-muted);
        font-size: 12px;
      }
      .profile-warning {
        margin: 10px 0 0;
        padding: 8px 10px;
        border-radius: 8px;
        background: var(--ssw-disclaimer-bg);
        color: var(--ssw-disclaimer-fg);
        font-size: 12px;
      }
      .action-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }
      .secondary-action {
        background: var(--ssw-bg);
      }
      .refs h4 {
        margin: 18px 0 6px;
        font-size: 13px;
        color: var(--ssw-fg-muted);
      }
      .card {
        background: var(--ssw-bg);
        border: 1px solid var(--ssw-border);
        border-radius: 6px;
        padding: 10px 12px;
        margin: 6px 0;
      }
      .card h5 {
        margin: 0 0 4px;
        font-size: 13px;
        font-weight: 600;
        color: var(--ssw-accent);
      }
      .card a {
        color: var(--ssw-accent);
        font-size: 12px;
        text-decoration: underline;
      }
      .card small {
        display: block;
        margin-top: 4px;
        color: var(--ssw-fg-muted);
        font-size: 11px;
      }
      .disclaimer {
        margin-top: 16px;
        padding: 10px 12px;
        background: var(--ssw-disclaimer-bg);
        color: var(--ssw-disclaimer-fg);
        border-radius: 6px;
        font-size: 12px;
        line-height: 1.5;
      }
      .meta {
        margin-top: 8px;
        color: var(--ssw-fg-muted);
        font-size: 11px;
      }
      .skeleton-stack {
        padding: 4px 0;
      }
      .skeleton .skel-line {
        background: linear-gradient(
          90deg,
          var(--ssw-bg-skeleton) 0%,
          var(--ssw-bg-skeleton-shine) 50%,
          var(--ssw-bg-skeleton) 100%
        );
        background-size: 200% 100%;
        animation: ssw-shimmer 1.4s ease-in-out infinite;
        border-radius: 4px;
        height: 12px;
        margin: 8px 0;
      }
      .skel-line--title { height: 18px; width: 60%; }
      .skel-line--body  { width: 95%; }
      .skel-line--body.short { width: 60%; }
      .skel-line--meta  { height: 10px; width: 30%; margin-top: 12px; }
      @keyframes ssw-shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position:  200% 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        .skeleton .skel-line { animation: none; opacity: 0.6; }
        .decision { transition: none; }
      }
      .decision.entering { opacity: 0; transform: translateY(4px); }
      .decision.entered  { opacity: 1; transform: translateY(0); }
    </style>
  </head>
  <body>
    <div id="root" role="region" aria-label="SSW Compass procedure classification"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
