<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none';"
    />
    <title>SSW Compass — Timeline</title>
    <style>
      :root {
        --ssw-fg: var(--color-text-primary, #111);
        --ssw-fg-muted: var(--color-text-secondary, #555);
        --ssw-bg: var(--color-bg-primary, #fff);
        --ssw-bg-muted: var(--color-bg-secondary, #f6f6f6);
        --ssw-bg-skeleton: var(--color-bg-tertiary, #f0f0f0);
        --ssw-bg-skeleton-shine: var(--color-bg-secondary, #e0e0e0);
        --ssw-accent: var(--color-accent, #0a2540);
        --ssw-border: var(--color-border, #e5e7eb);
        --ssw-disclaimer-bg: var(--color-info-bg, #fffbeb);
        --ssw-disclaimer-fg: var(--color-info-text, #713f12);
        --ssw-font: var(--font-family-body, -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif);
      }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--ssw-bg);
        color: var(--ssw-fg);
        font-family: var(--ssw-font);
        font-size: 14px;
        line-height: 1.6;
      }
      #root {
        padding: 16px;
      }
      .notice-l1 {
        display: block;
        color: var(--ssw-fg-muted);
        font-size: 12px;
        padding: 4px 0 12px;
      }
      .timeline {
        list-style: none;
        margin: 0;
        padding: 0 0 0 14px;
        border-left: 2px solid var(--ssw-border);
      }
      .deadline {
        position: relative;
        padding: 10px 0 10px 16px;
        margin: 0 0 4px;
        transition: opacity 200ms ease-out, transform 200ms ease-out;
      }
      .deadline::before {
        content: "";
        position: absolute;
        left: -19px;
        top: 16px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--ssw-accent);
      }
      .deadline h3 {
        margin: 0 0 4px;
        font-size: 14px;
        font-weight: 700;
        color: var(--ssw-accent);
      }
      .deadline .relative {
        display: inline-block;
        margin-right: 8px;
        padding: 1px 8px;
        background: var(--ssw-bg-muted);
        color: var(--ssw-fg-muted);
        border-radius: 10px;
        font-size: 11px;
        font-weight: 600;
      }
      .deadline .due-by {
        display: inline-block;
        padding: 1px 8px;
        background: #d1fae5;
        color: #065f46;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 600;
      }
      .deadline p.description {
        margin: 6px 0 0;
      }
      .related-forms {
        margin-top: 8px;
        font-size: 12px;
      }
      .related-forms ul {
        margin: 4px 0 0;
        padding-left: 18px;
      }
      .related-forms a {
        color: var(--ssw-accent);
        overflow-wrap: anywhere;
      }
      .trust-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        margin-left: 8px;
        padding: 1px 8px;
        border-radius: 10px;
        font-size: 10px;
        font-weight: 600;
      }
      .trust-badge::before {
        font-weight: 700;
        font-size: 10px;
      }
      .trust-badge--primary   { background: #d1fae5; color: #065f46; }
      .trust-badge--primary::before   { content: "\2713"; }
      .trust-badge--secondary { background: #fef3c7; color: #92400e; }
      .trust-badge--secondary::before { content: "\25B3"; }
      .trust-badge--community { background: #e5e7eb; color: #374151; }
      .trust-badge--community::before { content: "\25CB"; }
      @media (prefers-color-scheme: dark) {
        .trust-badge--primary {
          background: var(--color-success-bg, #064e3b);
          color: var(--color-success-text, #a7f3d0);
        }
        .trust-badge--secondary {
          background: var(--color-warning-bg, #78350f);
          color: var(--color-warning-text, #fde68a);
        }
        .trust-badge--community {
          background: var(--color-muted-bg, #374151);
          color: var(--color-muted-text, #d1d5db);
        }
      }
      .refs h4 {
        margin: 18px 0 6px;
        font-size: 13px;
        color: var(--ssw-fg-muted);
      }
      .card {
        background: var(--ssw-bg);
        border: 1px solid var(--ssw-border);
        border-radius: 6px;
        padding: 10px 12px;
        margin: 6px 0;
      }
      .card h5 {
        margin: 0 0 4px;
        font-size: 13px;
        font-weight: 600;
        color: var(--ssw-accent);
      }
      .card a {
        color: var(--ssw-accent);
        font-size: 12px;
        text-decoration: underline;
      }
      .card small {
        display: block;
        margin-top: 4px;
        color: var(--ssw-fg-muted);
        font-size: 11px;
      }
      .disclaimer {
        margin-top: 16px;
        padding: 10px 12px;
        background: var(--ssw-disclaimer-bg);
        color: var(--ssw-disclaimer-fg);
        border-radius: 6px;
        font-size: 12px;
        line-height: 1.5;
      }
      .meta {
        margin-top: 8px;
        color: var(--ssw-fg-muted);
        font-size: 11px;
      }
      .skeleton-stack {
        padding: 4px 0;
      }
      .skeleton .skel-line {
        background: linear-gradient(
          90deg,
          var(--ssw-bg-skeleton) 0%,
          var(--ssw-bg-skeleton-shine) 50%,
          var(--ssw-bg-skeleton) 100%
        );
        background-size: 200% 100%;
        animation: ssw-shimmer 1.4s ease-in-out infinite;
        border-radius: 4px;
        height: 12px;
        margin: 8px 0;
      }
      .skel-line--title { height: 16px; width: 60%; }
      .skel-line--body  { width: 95%; }
      .skel-line--body.short { width: 60%; }
      @keyframes ssw-shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position:  200% 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        .skeleton .skel-line { animation: none; opacity: 0.6; }
        .deadline { transition: none; }
      }
      .deadline.entering { opacity: 0; transform: translateY(4px); }
      .deadline.entered  { opacity: 1; transform: translateY(0); }
    </style>
  </head>
  <body>
    <div id="root" role="region" aria-label="SSW Compass deadline timeline"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
