<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none';"
    />
    <title>SSW Compass — Checklist</title>
    <style>
      :root {
        --ssw-fg: var(--color-text-primary, #111);
        --ssw-fg-muted: var(--color-text-secondary, #555);
        --ssw-bg: var(--color-bg-primary, #fff);
        --ssw-bg-muted: var(--color-bg-secondary, #f6f6f6);
        --ssw-bg-skeleton: var(--color-bg-tertiary, #f0f0f0);
        --ssw-bg-skeleton-shine: var(--color-bg-secondary, #e0e0e0);
        --ssw-accent: var(--color-accent, #0a2540);
        --ssw-border: var(--color-border, #e5e7eb);
        --ssw-disclaimer-bg: var(--color-info-bg, #fffbeb);
        --ssw-disclaimer-fg: var(--color-info-text, #713f12);
        --ssw-toast-bg: var(--color-danger-bg, #fee2e2);
        --ssw-toast-fg: var(--color-danger-text, #991b1b);
        --ssw-commit-bg: var(--color-accent, #0a2540);
        --ssw-commit-fg: #fff;
        --ssw-commit-disabled-bg: var(--color-bg-tertiary, #e5e7eb);
        --ssw-commit-disabled-fg: var(--color-text-secondary, #9ca3af);
        --ssw-font: var(--font-family-body, -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif);
      }
      html, body {
        margin: 0; padding: 0; background: var(--ssw-bg); color: var(--ssw-fg);
        font-family: var(--ssw-font); font-size: 14px; line-height: 1.6;
      }
      #root { padding: 16px; }
      .notice-l1 {
        display: block; color: var(--ssw-fg-muted); font-size: 12px; padding: 4px 0 12px;
      }
      .doc-list { margin: 0; padding: 0; }
      .doc-group {
        margin: 0 0 14px;
      }
      .doc-group h2 {
        margin: 10px 0 6px;
        color: var(--ssw-fg-muted);
        font-size: 13px;
        font-weight: 700;
      }
      .doc-group ul { list-style: none; margin: 0; padding: 0; }
      .doc-row {
        display: flex; gap: 10px; align-items: flex-start;
        padding: 10px 12px; margin: 6px 0;
        background: var(--ssw-bg); border: 1px solid var(--ssw-border); border-radius: 8px;
      }
      .doc-row input[type="checkbox"] {
        flex-shrink: 0; width: 18px; height: 18px; margin-top: 2px; cursor: pointer;
      }
      .doc-row .doc-meta { flex: 1; min-width: 0; }
      .doc-row h3 {
        margin: 0 0 4px; font-size: 14px; font-weight: 600; color: var(--ssw-accent);
      }
      .doc-row p.desc { margin: 2px 0 6px; color: var(--ssw-fg); }
      .doc-row small.ministry {
        display: inline-block; margin-right: 8px; color: var(--ssw-fg-muted); font-size: 11px;
      }
      .doc-row label.doc-label {
        cursor: pointer; user-select: none; display: block;
      }

      /* trust-badge: 3-colour + a11y icon prefix (WCAG 1.4.1) */
      .trust-badge {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 1px 8px; border-radius: 10px; font-size: 10px; font-weight: 600;
      }
      .trust-badge::before {
        font-weight: 700; font-size: 10px;
      }
      .trust-badge--primary   { background: #d1fae5; color: #065f46; }
      .trust-badge--primary::before   { content: "\2713"; }
      .trust-badge--secondary { background: #fef3c7; color: #92400e; }
      .trust-badge--secondary::before { content: "\25B3"; }
      .trust-badge--community { background: #e5e7eb; color: #374151; }
      .trust-badge--community::before { content: "\25CB"; }
      .status-badge {
        display: inline-flex;
        padding: 1px 8px;
        border-radius: 999px;
        background: var(--ssw-bg-muted);
        color: var(--ssw-fg-muted);
        font-size: 10px;
        font-weight: 700;
      }
      .status-omitted_due_to_category {
        background: var(--ssw-disclaimer-bg);
        color: var(--ssw-disclaimer-fg);
      }
      .status-applicant_specific,
      .status-sector_specific {
        background: #dbeafe;
        color: #1d4ed8;
      }
      .language-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin: 4px 0;
      }
      .language-badge {
        display: inline-flex;
        padding: 1px 8px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 700;
      }
      .language-badge--required {
        background: #fef3c7;
        color: #92400e;
      }
      .language-badge--available {
        background: #e0e7ff;
        color: #3730a3;
      }
      .language-source {
        display: block;
        margin-top: 2px;
        color: var(--ssw-fg-muted);
        font-size: 10px;
        overflow-wrap: anywhere;
      }
      @media (prefers-color-scheme: dark) {
        .trust-badge--primary {
          background: var(--color-success-bg, #064e3b);
          color: var(--color-success-text, #a7f3d0);
        }
        .trust-badge--secondary {
          background: var(--color-warning-bg, #78350f);
          color: var(--color-warning-text, #fde68a);
        }
        .trust-badge--community {
          background: var(--color-muted-bg, #374151);
          color: var(--color-muted-text, #d1d5db);
        }
        .status-applicant_specific,
        .status-sector_specific {
          background: #1e3a8a;
          color: #bfdbfe;
        }
        .language-badge--required {
          background: #78350f;
          color: #fde68a;
        }
        .language-badge--available {
          background: #312e81;
          color: #c7d2fe;
        }
      }

      .notes {
        margin: 16px 0 8px;
      }
      .notes label { display: block; margin-bottom: 4px; font-size: 12px; color: var(--ssw-fg-muted); }
      .notes textarea {
        width: 100%; min-height: 72px; padding: 8px;
        font-family: inherit; font-size: 13px; line-height: 1.5;
        border: 1px solid var(--ssw-border); border-radius: 6px;
        background: var(--ssw-bg); color: var(--ssw-fg);
        resize: vertical;
      }

      .commit-bar {
        display: flex; align-items: center; gap: 12px; margin-top: 16px;
      }
      .commit-btn {
        padding: 8px 16px; border: none; border-radius: 6px;
        background: var(--ssw-commit-bg); color: var(--ssw-commit-fg);
        font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
        transition: opacity 150ms ease-out;
      }
      .commit-btn:disabled {
        background: var(--ssw-commit-disabled-bg); color: var(--ssw-commit-disabled-fg);
        cursor: not-allowed;
      }
      .commit-status { font-size: 12px; color: var(--ssw-fg-muted); }
      .toast {
        display: none; margin-top: 10px; padding: 8px 12px; border-radius: 6px;
        background: var(--ssw-toast-bg); color: var(--ssw-toast-fg);
        font-size: 12px;
      }
      .toast.visible { display: block; }

      .disclaimer {
        margin-top: 16px; padding: 10px 12px;
        background: var(--ssw-disclaimer-bg); color: var(--ssw-disclaimer-fg);
        border-radius: 6px; font-size: 12px; line-height: 1.5;
      }
      .meta {
        margin-top: 8px; color: var(--ssw-fg-muted); font-size: 11px;
      }

      .skeleton-stack { padding: 4px 0; }
      .skeleton .skel-line {
        background: linear-gradient(90deg,
          var(--ssw-bg-skeleton) 0%, var(--ssw-bg-skeleton-shine) 50%, var(--ssw-bg-skeleton) 100%);
        background-size: 200% 100%;
        animation: ssw-shimmer 1.4s ease-in-out infinite;
        border-radius: 4px; height: 12px; margin: 8px 0;
      }
      .skel-line--title { height: 16px; width: 60%; }
      .skel-line--body  { width: 95%; }
      @keyframes ssw-shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position:  200% 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        .skeleton .skel-line { animation: none; opacity: 0.6; }
      }

      .doc-source {
        display: inline-block; margin-top: 4px;
        color: var(--ssw-accent); font-size: 12px; text-decoration: underline;
      }

      /* --- progress bar --- */
      .progress-bar {
        display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        margin: 0 0 12px;
      }
      .progress-count { font-size: 12px; font-weight: 700; color: var(--ssw-fg); }
      .progress-track {
        flex: 1; min-width: 80px; height: 8px; border-radius: 999px;
        background: var(--ssw-bg-muted); overflow: hidden;
      }
      .progress-fill {
        display: block; height: 100%; width: 0; border-radius: 999px;
        background: var(--ssw-accent); transition: width 200ms ease-out;
      }

      /* --- shared widget controls (ui-bridge convention) --- */
      .ssw-toolbar { display: flex; justify-content: flex-end; margin: 0 0 10px; }
      .ssw-lang-toggle {
        display: inline-flex; gap: 2px; padding: 2px; border-radius: 999px;
        border: 1px solid var(--ssw-border); background: var(--ssw-bg-muted);
      }
      .ssw-lang-btn {
        border: none; background: transparent; color: var(--ssw-fg-muted);
        font: inherit; font-size: 11px; line-height: 1; padding: 5px 10px;
        min-height: 28px; border-radius: 999px; cursor: pointer;
      }
      .ssw-lang-btn--active { background: var(--ssw-bg); color: var(--ssw-fg); font-weight: 700; }
      .ssw-copy-btn {
        display: inline-flex; align-items: center; gap: 4px; min-height: 30px;
        border: 1px solid var(--ssw-border); background: var(--ssw-bg);
        color: var(--ssw-fg-muted); border-radius: 8px; padding: 3px 10px;
        font: inherit; font-size: 11px; cursor: pointer;
      }
      .ssw-copy-btn[data-ssw-copied="true"] { border-color: #16a34a; color: #16a34a; }
      .ssw-copy-btn[data-ssw-copied="false"] { border-color: #dc2626; color: #dc2626; }
      :focus-visible { outline: 2px solid var(--ssw-accent); outline-offset: 2px; border-radius: 4px; }

      /* --- dark mode base vars (host pushes data-theme; OS dark is a fallback) --- */
      :root { --ssw-on-accent: #fff; }
      [data-theme="dark"] {
        --ssw-fg: var(--color-text-primary, #e7e7ea);
        --ssw-fg-muted: var(--color-text-secondary, #a1a1aa);
        --ssw-bg: var(--color-bg-primary, #1b1c1f);
        --ssw-bg-muted: var(--color-bg-secondary, #27282c);
        --ssw-bg-skeleton: var(--color-bg-tertiary, #27282c);
        --ssw-bg-skeleton-shine: var(--color-bg-secondary, #3a3b40);
        --ssw-accent: var(--color-accent, #8ab4f8);
        --ssw-on-accent: #10243f;
        --ssw-border: var(--color-border, #3a3b40);
        --ssw-disclaimer-bg: var(--color-info-bg, #2a2510);
        --ssw-disclaimer-fg: var(--color-info-text, #fde68a);
        --ssw-toast-bg: var(--color-danger-bg, #3f1d1d);
        --ssw-toast-fg: var(--color-danger-text, #fca5a5);
        --ssw-commit-bg: var(--color-accent, #2f6feb);
        --ssw-commit-fg: #fff;
        --ssw-commit-disabled-bg: var(--color-bg-tertiary, #3a3b40);
        --ssw-commit-disabled-fg: var(--color-text-secondary, #71717a);
      }
      [data-theme="dark"] .trust-badge--primary { background: #14352a; color: #6ee7b7; }
      [data-theme="dark"] .trust-badge--secondary { background: #3f3413; color: #fcd34d; }
      [data-theme="dark"] .trust-badge--community { background: #374151; color: #d1d5db; }
      [data-theme="dark"] .status-applicant_specific,
      [data-theme="dark"] .status-sector_specific { background: #1e3a8a; color: #bfdbfe; }
      [data-theme="dark"] .language-badge--required { background: #78350f; color: #fde68a; }
      [data-theme="dark"] .language-badge--available { background: #312e81; color: #c7d2fe; }
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --ssw-fg: var(--color-text-primary, #e7e7ea);
          --ssw-fg-muted: var(--color-text-secondary, #a1a1aa);
          --ssw-bg: var(--color-bg-primary, #1b1c1f);
          --ssw-bg-muted: var(--color-bg-secondary, #27282c);
          --ssw-bg-skeleton: var(--color-bg-tertiary, #27282c);
          --ssw-bg-skeleton-shine: var(--color-bg-secondary, #3a3b40);
          --ssw-accent: var(--color-accent, #8ab4f8);
          --ssw-on-accent: #10243f;
          --ssw-border: var(--color-border, #3a3b40);
          --ssw-disclaimer-bg: var(--color-info-bg, #2a2510);
          --ssw-disclaimer-fg: var(--color-info-text, #fde68a);
          --ssw-toast-bg: var(--color-danger-bg, #3f1d1d);
          --ssw-toast-fg: var(--color-danger-text, #fca5a5);
          --ssw-commit-bg: var(--color-accent, #2f6feb);
          --ssw-commit-fg: #fff;
          --ssw-commit-disabled-bg: var(--color-bg-tertiary, #3a3b40);
          --ssw-commit-disabled-fg: var(--color-text-secondary, #71717a);
        }
      }
    </style>
  </head>
  <body>
    <div id="root" role="region" aria-label="SSW Compass document checklist"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
