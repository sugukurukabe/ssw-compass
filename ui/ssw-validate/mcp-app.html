<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none';"
    />
    <title>SSW Compass — Zairyu</title>
    <style>
      :root {
        --ssw-fg: var(--color-text-primary, #111);
        --ssw-fg-muted: var(--color-text-secondary, #555);
        --ssw-bg: var(--color-bg-primary, #fff);
        --ssw-bg-muted: var(--color-bg-secondary, #f6f6f6);
        --ssw-accent: var(--color-accent, #0a2540);
        --ssw-border: var(--color-border, #e5e7eb);
        --ssw-danger-bg: var(--color-background-danger, #fee2e2);
        --ssw-danger-fg: var(--color-text-danger, #991b1b);
        --ssw-warning-bg: var(--color-background-warning, #fffbeb);
        --ssw-warning-fg: var(--color-text-warning, #713f12);
        --ssw-success-bg: var(--color-background-success, #ecfdf5);
        --ssw-success-fg: var(--color-text-success, #065f46);
        --ssw-font: var(--font-family-body, -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif);
      }
      html, body { margin: 0; padding: 0; background: var(--ssw-bg); color: var(--ssw-fg); font-family: var(--ssw-font); font-size: 14px; line-height: 1.6; }
      #root { padding: 16px; }
      .notice-l1 { display: block; color: var(--ssw-fg-muted); font-size: 12px; padding: 4px 0 12px; }
      .panel { border: 1px solid var(--ssw-border); border-radius: 10px; padding: 14px 16px; background: var(--ssw-bg); }
      .panel h2 { margin: 0 0 8px; font-size: 16px; color: var(--ssw-accent); }
      .panel h3 { margin: 12px 0 4px; font-size: 13px; color: var(--ssw-fg-muted); }
      .badge { display: inline-flex; border-radius: 999px; padding: 4px 10px; font-weight: 700; margin-bottom: 10px; }
      .badge.OK { background: var(--ssw-success-bg); color: var(--ssw-success-fg); }
      .badge.WARNING { background: var(--ssw-warning-bg); color: var(--ssw-warning-fg); }
      .badge.ILLEGAL { background: var(--ssw-danger-bg); color: var(--ssw-danger-fg); }
      /* H06_ILLEGAL_WORK_ALERT: 最上部に強い赤バナー */
      .illegal-alert {
        margin: 0 0 12px; padding: 12px 14px; border-radius: 10px;
        background: var(--ssw-danger-bg); color: var(--ssw-danger-fg);
        border: 2px solid var(--ssw-danger-fg); font-weight: 700; line-height: 1.5;
      }
      .basis ul { margin: 4px 0 0; padding-left: 18px; }
      .basis li { margin-bottom: 2px; }
      .action p { margin: 4px 0 0; }
      .cta { margin-top: 12px; padding: 10px 12px; border-radius: 8px; background: var(--ssw-bg-muted); }
      .cta--escalate {
        background: var(--ssw-warning-bg); color: var(--ssw-warning-fg); font-weight: 600;
      }
      .disclaimer { margin-top: 14px; color: var(--ssw-fg-muted); font-size: 12px; }

      /* --- shared widget controls (ui-bridge convention) --- */
      .ssw-toolbar { display: flex; justify-content: flex-end; margin: 0 0 10px; }
      .ssw-lang-toggle {
        display: inline-flex; gap: 2px; padding: 2px; border-radius: 999px;
        border: 1px solid var(--ssw-border); background: var(--ssw-bg-muted);
      }
      .ssw-lang-btn {
        border: none; background: transparent; color: var(--ssw-fg-muted);
        font: inherit; font-size: 11px; line-height: 1; padding: 5px 10px;
        min-height: 28px; border-radius: 999px; cursor: pointer;
      }
      .ssw-lang-btn--active { background: var(--ssw-bg); color: var(--ssw-fg); font-weight: 700; }
      :focus-visible { outline: 2px solid var(--ssw-accent); outline-offset: 2px; border-radius: 4px; }

      /* --- dark mode (host pushes data-theme; OS dark is a fallback) --- */
      [data-theme="dark"] {
        --ssw-fg: var(--color-text-primary, #e7e7ea);
        --ssw-fg-muted: var(--color-text-secondary, #a1a1aa);
        --ssw-bg: var(--color-bg-primary, #1b1c1f);
        --ssw-bg-muted: var(--color-bg-secondary, #27282c);
        --ssw-accent: var(--color-accent, #8ab4f8);
        --ssw-border: var(--color-border, #3a3b40);
        --ssw-danger-bg: var(--color-background-danger, #4c1d1d);
        --ssw-danger-fg: var(--color-text-danger, #fca5a5);
        --ssw-warning-bg: var(--color-background-warning, #3f3413);
        --ssw-warning-fg: var(--color-text-warning, #fcd34d);
        --ssw-success-bg: var(--color-background-success, #14352a);
        --ssw-success-fg: var(--color-text-success, #6ee7b7);
      }
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --ssw-fg: var(--color-text-primary, #e7e7ea);
          --ssw-fg-muted: var(--color-text-secondary, #a1a1aa);
          --ssw-bg: var(--color-bg-primary, #1b1c1f);
          --ssw-bg-muted: var(--color-bg-secondary, #27282c);
          --ssw-accent: var(--color-accent, #8ab4f8);
          --ssw-border: var(--color-border, #3a3b40);
          --ssw-danger-bg: var(--color-background-danger, #4c1d1d);
          --ssw-danger-fg: var(--color-text-danger, #fca5a5);
          --ssw-warning-bg: var(--color-background-warning, #3f3413);
          --ssw-warning-fg: var(--color-text-warning, #fcd34d);
          --ssw-success-bg: var(--color-background-success, #14352a);
          --ssw-success-fg: var(--color-text-success, #6ee7b7);
        }
      }
    </style>
  </head>
  <body>
    <div id="root" role="region" aria-label="SSW Compass zairyu compatibility"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
