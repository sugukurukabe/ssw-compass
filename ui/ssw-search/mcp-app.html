<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none';"
    />
    <title>SSW Compass</title>
    <style>
      :root {
        --ssw-fg: var(--color-text-primary, #111);
        --ssw-fg-muted: var(--color-text-secondary, #555);
        --ssw-bg: var(--color-bg-primary, #fff);
        --ssw-bg-muted: var(--color-bg-secondary, #f6f6f6);
        --ssw-bg-skeleton: var(--color-bg-tertiary, #f0f0f0);
        --ssw-bg-skeleton-shine: var(--color-bg-secondary, #e0e0e0);
        --ssw-accent: var(--color-accent, #0a2540);
        --ssw-border: var(--color-border, #e5e7eb);
        --ssw-disclaimer-bg: var(--color-info-bg, #fffbeb);
        --ssw-disclaimer-fg: var(--color-info-text, #713f12);
        --ssw-font: var(--font-family-body, -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif);
      }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--ssw-bg);
        color: var(--ssw-fg);
        font-family: var(--ssw-font);
        font-size: 14px;
        line-height: 1.6;
      }
      #root {
        padding: 16px;
      }
      .notice-l1 {
        display: block;
        color: var(--ssw-fg-muted);
        font-size: 12px;
        padding: 4px 0 12px;
      }
      .summary-card {
        background: var(--ssw-bg);
        border: 1px solid var(--ssw-border);
        border-left: 4px solid var(--ssw-accent);
        border-radius: 10px;
        padding: 14px 16px;
        margin-bottom: 12px;
      }
      .summary-card h2 {
        margin: 0 0 8px;
        color: var(--ssw-accent);
        font-size: 15px;
      }
      .summary-card p {
        margin: 0 0 10px;
      }
      .followup-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 10px 0;
      }
      .followup-chip,
      .sources-chip {
        display: inline-flex;
        min-height: 36px;
        align-items: center;
        border-radius: 999px;
        border: 1px solid var(--ssw-border);
        background: var(--ssw-bg-muted);
        color: var(--ssw-fg);
        padding: 6px 10px;
        font: inherit;
        font-size: 12px;
      }
      .sources-chip {
        min-height: 44px;
        cursor: pointer;
      }
      .card {
        background: var(--ssw-bg);
        border: 1px solid var(--ssw-border);
        border-radius: 8px;
        padding: 12px 14px;
        margin: 8px 0;
        transition: opacity 200ms ease-out, transform 200ms ease-out;
      }
      .card h3 {
        margin: 0 0 6px;
        font-size: 14px;
        font-weight: 600;
        color: var(--ssw-accent);
      }
      .card p {
        margin: 0 0 8px;
        color: var(--ssw-fg);
      }
      .card a {
        color: var(--ssw-accent);
        font-size: 12px;
        text-decoration: underline;
      }
      .card small {
        display: block;
        margin-top: 6px;
        color: var(--ssw-fg-muted);
        font-size: 11px;
      }
      .disclaimer {
        margin-top: 16px;
        padding: 10px 12px;
        background: var(--ssw-disclaimer-bg);
        color: var(--ssw-disclaimer-fg);
        border-radius: 6px;
        font-size: 12px;
        line-height: 1.5;
      }
      .meta {
        margin-top: 8px;
        color: var(--ssw-fg-muted);
        font-size: 11px;
      }
      .skeleton-stack {
        padding: 4px 0;
      }
      .skeleton .skel-line {
        background: linear-gradient(
          90deg,
          var(--ssw-bg-skeleton) 0%,
          var(--ssw-bg-skeleton-shine) 50%,
          var(--ssw-bg-skeleton) 100%
        );
        background-size: 200% 100%;
        animation: ssw-shimmer 1.4s ease-in-out infinite;
        border-radius: 4px;
        height: 12px;
        margin: 8px 0;
      }
      .skel-line--title { height: 18px; width: 70%; }
      .skel-line--body  { width: 95%; }
      .skel-line--body.short { width: 60%; }
      .skel-line--meta  { height: 10px; width: 30%; margin-top: 12px; }
      @keyframes ssw-shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position:  200% 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        .skeleton .skel-line { animation: none; opacity: 0.6; }
        .card { transition: none; }
      }
      .card.entering { opacity: 0; transform: translateY(4px); }
      .card.entered  { opacity: 1; transform: translateY(0); }

      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }

      /* --- confidence bar --- */
      .conf { margin: 8px 0 6px; }
      .conf-label { display: block; font-size: 11px; color: var(--ssw-fg-muted); margin-bottom: 3px; }
      .conf-track {
        display: block; height: 6px; border-radius: 999px;
        background: var(--ssw-bg-muted); overflow: hidden;
      }
      .conf-fill {
        display: block; height: 100%; border-radius: 999px;
        background: var(--ssw-accent); width: 0;
      }
      .card-actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 6px; }
      .summary-actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
      .empty-state {
        margin: 4px 0 0; padding: 12px; border-radius: 8px;
        background: var(--ssw-bg-muted); color: var(--ssw-fg-muted);
      }

      /* --- shared widget controls (ui-bridge convention) --- */
      .ssw-toolbar { display: flex; justify-content: flex-end; margin: 0 0 10px; }
      .ssw-lang-toggle {
        display: inline-flex; gap: 2px; padding: 2px; border-radius: 999px;
        border: 1px solid var(--ssw-border); background: var(--ssw-bg-muted);
      }
      .ssw-lang-btn {
        border: none; background: transparent; color: var(--ssw-fg-muted);
        font: inherit; font-size: 11px; line-height: 1; padding: 5px 10px;
        min-height: 28px; border-radius: 999px; cursor: pointer;
      }
      .ssw-lang-btn--active { background: var(--ssw-bg); color: var(--ssw-fg); font-weight: 700; }
      .ssw-copy-btn {
        display: inline-flex; align-items: center; gap: 4px; min-height: 32px;
        border: 1px solid var(--ssw-border); background: var(--ssw-bg);
        color: var(--ssw-fg-muted); border-radius: 8px; padding: 4px 10px;
        font: inherit; font-size: 11px; cursor: pointer;
      }
      .ssw-copy-btn[data-ssw-copied="true"] { border-color: #16a34a; color: #16a34a; }
      .ssw-copy-btn[data-ssw-copied="false"] { border-color: #dc2626; color: #dc2626; }
      :focus-visible { outline: 2px solid var(--ssw-accent); outline-offset: 2px; border-radius: 4px; }

      /* --- dark mode (host pushes data-theme; OS dark is a fallback) --- */
      :root { --ssw-on-accent: #fff; }
      [data-theme="dark"] {
        --ssw-fg: var(--color-text-primary, #e7e7ea);
        --ssw-fg-muted: var(--color-text-secondary, #a1a1aa);
        --ssw-bg: var(--color-bg-primary, #1b1c1f);
        --ssw-bg-muted: var(--color-bg-secondary, #27282c);
        --ssw-bg-skeleton: var(--color-bg-tertiary, #27282c);
        --ssw-bg-skeleton-shine: var(--color-bg-secondary, #3a3b40);
        --ssw-accent: var(--color-accent, #8ab4f8);
        --ssw-on-accent: #10243f;
        --ssw-border: var(--color-border, #3a3b40);
        --ssw-disclaimer-bg: var(--color-info-bg, #2a2510);
        --ssw-disclaimer-fg: var(--color-info-text, #fde68a);
      }
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --ssw-fg: var(--color-text-primary, #e7e7ea);
          --ssw-fg-muted: var(--color-text-secondary, #a1a1aa);
          --ssw-bg: var(--color-bg-primary, #1b1c1f);
          --ssw-bg-muted: var(--color-bg-secondary, #27282c);
          --ssw-bg-skeleton: var(--color-bg-tertiary, #27282c);
          --ssw-bg-skeleton-shine: var(--color-bg-secondary, #3a3b40);
          --ssw-accent: var(--color-accent, #8ab4f8);
          --ssw-on-accent: #10243f;
          --ssw-border: var(--color-border, #3a3b40);
          --ssw-disclaimer-bg: var(--color-info-bg, #2a2510);
          --ssw-disclaimer-fg: var(--color-info-text, #fde68a);
        }
      }
    </style>
  </head>
  <body>
    <div id="root" role="region" aria-label="SSW Compass search results"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
