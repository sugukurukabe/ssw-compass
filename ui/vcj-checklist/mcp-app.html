<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      TODO(sprint-3): Replace 'unsafe-inline' with sha256 hashes.
      See v2 §6.2 (post-build script) and v3 §23 (Report-Only rollout).
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none';"
    />
    <title>Visa Compass Japan — Checklist</title>
    <style>
      :root {
        --vcj-fg: var(--color-text-primary, #111);
        --vcj-fg-muted: var(--color-text-secondary, #555);
        --vcj-bg: var(--color-bg-primary, #fff);
        --vcj-bg-muted: var(--color-bg-secondary, #f6f6f6);
        --vcj-bg-skeleton: var(--color-bg-tertiary, #f0f0f0);
        --vcj-bg-skeleton-shine: var(--color-bg-secondary, #e0e0e0);
        --vcj-accent: var(--color-accent, #0a2540);
        --vcj-border: var(--color-border, #e5e7eb);
        --vcj-disclaimer-bg: var(--color-info-bg, #fffbeb);
        --vcj-disclaimer-fg: var(--color-info-text, #713f12);
        --vcj-toast-bg: var(--color-danger-bg, #fee2e2);
        --vcj-toast-fg: var(--color-danger-text, #991b1b);
        --vcj-commit-bg: var(--color-accent, #0a2540);
        --vcj-commit-fg: #fff;
        --vcj-commit-disabled-bg: var(--color-bg-tertiary, #e5e7eb);
        --vcj-commit-disabled-fg: var(--color-text-secondary, #9ca3af);
        --vcj-font: var(--font-family-body, -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif);
      }
      html, body {
        margin: 0; padding: 0; background: var(--vcj-bg); color: var(--vcj-fg);
        font-family: var(--vcj-font); font-size: 14px; line-height: 1.6;
      }
      #root { padding: 16px; }
      .notice-l1 {
        display: block; color: var(--vcj-fg-muted); font-size: 12px; padding: 4px 0 12px;
      }
      .doc-list { list-style: none; margin: 0; padding: 0; }
      .doc-row {
        display: flex; gap: 10px; align-items: flex-start;
        padding: 10px 12px; margin: 6px 0;
        background: var(--vcj-bg); border: 1px solid var(--vcj-border); border-radius: 8px;
      }
      .doc-row input[type="checkbox"] {
        flex-shrink: 0; width: 18px; height: 18px; margin-top: 2px; cursor: pointer;
      }
      .doc-row .doc-meta { flex: 1; min-width: 0; }
      .doc-row h3 {
        margin: 0 0 4px; font-size: 14px; font-weight: 600; color: var(--vcj-accent);
      }
      .doc-row p.desc { margin: 2px 0 6px; color: var(--vcj-fg); }
      .doc-row small.ministry {
        display: inline-block; margin-right: 8px; color: var(--vcj-fg-muted); font-size: 11px;
      }
      .doc-row label.doc-label {
        cursor: pointer; user-select: none; display: block;
      }

      /* trust-badge: 3-colour + a11y icon prefix (WCAG 1.4.1) */
      .trust-badge {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 1px 8px; border-radius: 10px; font-size: 10px; font-weight: 600;
      }
      .trust-badge::before {
        font-weight: 700; font-size: 10px;
      }
      .trust-badge--primary   { background: #d1fae5; color: #065f46; }
      .trust-badge--primary::before   { content: "\2713"; }
      .trust-badge--secondary { background: #fef3c7; color: #92400e; }
      .trust-badge--secondary::before { content: "\25B3"; }
      .trust-badge--community { background: #e5e7eb; color: #374151; }
      .trust-badge--community::before { content: "\25CB"; }
      @media (prefers-color-scheme: dark) {
        .trust-badge--primary {
          background: var(--color-success-bg, #064e3b);
          color: var(--color-success-text, #a7f3d0);
        }
        .trust-badge--secondary {
          background: var(--color-warning-bg, #78350f);
          color: var(--color-warning-text, #fde68a);
        }
        .trust-badge--community {
          background: var(--color-muted-bg, #374151);
          color: var(--color-muted-text, #d1d5db);
        }
      }

      .notes {
        margin: 16px 0 8px;
      }
      .notes label { display: block; margin-bottom: 4px; font-size: 12px; color: var(--vcj-fg-muted); }
      .notes textarea {
        width: 100%; min-height: 72px; padding: 8px;
        font-family: inherit; font-size: 13px; line-height: 1.5;
        border: 1px solid var(--vcj-border); border-radius: 6px;
        background: var(--vcj-bg); color: var(--vcj-fg);
        resize: vertical;
      }

      .commit-bar {
        display: flex; align-items: center; gap: 12px; margin-top: 16px;
      }
      .commit-btn {
        padding: 8px 16px; border: none; border-radius: 6px;
        background: var(--vcj-commit-bg); color: var(--vcj-commit-fg);
        font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
        transition: opacity 150ms ease-out;
      }
      .commit-btn:disabled {
        background: var(--vcj-commit-disabled-bg); color: var(--vcj-commit-disabled-fg);
        cursor: not-allowed;
      }
      .commit-status { font-size: 12px; color: var(--vcj-fg-muted); }
      .toast {
        display: none; margin-top: 10px; padding: 8px 12px; border-radius: 6px;
        background: var(--vcj-toast-bg); color: var(--vcj-toast-fg);
        font-size: 12px;
      }
      .toast.visible { display: block; }

      .disclaimer {
        margin-top: 16px; padding: 10px 12px;
        background: var(--vcj-disclaimer-bg); color: var(--vcj-disclaimer-fg);
        border-radius: 6px; font-size: 12px; line-height: 1.5;
      }
      .meta {
        margin-top: 8px; color: var(--vcj-fg-muted); font-size: 11px;
      }

      .skeleton-stack { padding: 4px 0; }
      .skeleton .skel-line {
        background: linear-gradient(90deg,
          var(--vcj-bg-skeleton) 0%, var(--vcj-bg-skeleton-shine) 50%, var(--vcj-bg-skeleton) 100%);
        background-size: 200% 100%;
        animation: vcj-shimmer 1.4s ease-in-out infinite;
        border-radius: 4px; height: 12px; margin: 8px 0;
      }
      .skel-line--title { height: 16px; width: 60%; }
      .skel-line--body  { width: 95%; }
      @keyframes vcj-shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position:  200% 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        .skel-line { animation: none; opacity: 0.6; }
      }
    </style>
  </head>
  <body>
    <div id="root" role="region" aria-label="Visa Compass Japan document checklist"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
