name: CD — prod (manual only)

# Manual prod deploy. Production is live behind the Global HTTPS LB + Cloud
# Armor at https://mcp.ssw-compass.jp. After deploy, the smoke-test job probes
# the public endpoint (health, well-known, MCP tools, UI resources). If the
# public URL differs, override PROD_PUBLIC_URL via workflow input.

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (typically the staging-verified SHA)"
        required: true
      i_understand_prod:
        description: "Type 'yes' to confirm prod deploy intent"
        required: true
        default: "no"
      prod_public_url:
        description: "Public base URL for post-deploy smoke test"
        required: false
        default: "https://mcp.ssw-compass.jp"

concurrency:
  group: cd-prod
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ssw-compass-prod-494613
  REGION: asia-northeast1
  SERVICE_NAME: ssw-mcp-prod
  AR_REPO_URL: asia-northeast1-docker.pkg.dev/ssw-compass-prod-494613/ssw-images
  IMAGE_NAME: server

jobs:
  confirm:
    name: Confirm prod deploy intent
    runs-on: ubuntu-latest
    steps:
      - name: Gate check
        run: |
          if [ "${{ github.event.inputs.i_understand_prod }}" != "yes" ]; then
            echo "::error::i_understand_prod input was not 'yes' — aborting."
            exit 1
          fi

  deploy:
    name: gcloud run deploy (prod, internal-LB)
    needs: confirm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --image=${{ env.AR_REPO_URL }}/${{ env.IMAGE_NAME }}:${TAG} \
            --quiet

      - name: Describe deployed revision
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='yaml(metadata.annotations."run.googleapis.com/ingress",spec.template.spec.serviceAccountName,status.latestReadyRevisionName)'

  smoke-test:
    name: Smoke test (prod public endpoint)
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Public health + well-known probes
        run: |
          set -euo pipefail
          BASE="${{ github.event.inputs.prod_public_url }}"
          echo "Probing $BASE ..."
          curl -fsS --max-time 15 "$BASE/health" | tee /tmp/health.json
          jq -e '.status == "ok" and .service == "ssw-mcp"' /tmp/health.json
          curl -fsS --max-time 15 "$BASE/.well-known/mcp.json" | jq -e '.name == "SSW Compass"'
          curl -fsS --max-time 15 "$BASE/privacy" | grep -q 'SSW Compass Privacy Policy'
          curl -fsS --max-time 15 "$BASE/.well-known/ai-plugin.json" | jq -e '.name_for_human == "SSW Compass Japan"'
          curl -fsS --max-time 15 "$BASE/.well-known/openapi.json" | jq -e '.openapi == "3.1.0"'

      - name: MCP protocol smoke (tools / UI resources / CSP)
        run: |
          set -euo pipefail
          MCP_URL="${{ github.event.inputs.prod_public_url }}/mcp" node scripts/smoke-mcp.mjs
