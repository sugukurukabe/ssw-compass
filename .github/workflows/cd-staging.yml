name: CD — staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Custom image tag (defaults to commit SHA)"
        required: false
        default: ""

concurrency:
  group: cd-staging
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ssw-compass-prod-494613
  REGION: asia-northeast1
  SERVICE_NAME: ssw-mcp-staging
  AR_REPO_URL: asia-northeast1-docker.pkg.dev/ssw-compass-prod-494613/ssw-images
  IMAGE_NAME: server

jobs:
  ci-gate:
    name: CI gate (re-run lint/typecheck/test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec biome check apps packages ui --max-diagnostics=200
      - run: pnpm run typecheck
      - run: pnpm -F @ssw/server test

  build-push:
    name: Build + push Docker image
    needs: ci-gate
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.set-tag.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tag
        id: set-tag
        run: |
          INPUT_TAG="${{ github.event.inputs.image_tag }}"
          TAG="${INPUT_TAG:-${GITHUB_SHA}}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${AR_REPO_URL}/${IMAGE_NAME}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build + push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ${{ steps.set-tag.outputs.image_uri }}
            ${{ env.AR_REPO_URL }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: gcloud run deploy (staging)
    needs: build-push
    runs-on: ubuntu-latest
    outputs:
      service_url: ${{ steps.deploy-out.outputs.service_url }}
      prev_revision: ${{ steps.capture-prev.outputs.prev_revision }}
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Capture previous revision (for revert-on-failure)
        id: capture-prev
        run: |
          PREV=$(gcloud run revisions list \
            --service=${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(metadata.name)' \
            --limit=10 \
            --filter='status.conditions.status=True AND status.conditions.type=Active' \
            2>/dev/null | head -1 || echo "")
          echo "prev_revision=${PREV}" >> "$GITHUB_OUTPUT"
          echo "Previous active revision: ${PREV:-<none — first deploy>}"

      - name: Deploy new revision
        id: deploy-out
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --image=${{ needs.build-push.outputs.image_uri }} \
            --update-env-vars=SSW_AUTH_MODE=anonymous \
            --quiet
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "service_url=${URL}" >> "$GITHUB_OUTPUT"

  smoke-test:
    name: Smoke test (staging)
    needs: [build-push, deploy]
    runs-on: ubuntu-latest
    steps:
      # ADR-012 §Decision 5: mint an ID token with audience=service URL
      # directly from the WIF exchange instead of calling
      # `gcloud auth print-identity-token --audiences=...`, which does
      # not accept the federated credential (Invalid account type).
      - name: Authenticate + mint ID token via WIF
        id: id-token
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA_EMAIL }}
          token_format: id_token
          id_token_audience: ${{ needs.deploy.outputs.service_url }}

      - name: HTTP /health probe
        run: |
          set -euo pipefail
          URL="${{ needs.deploy.outputs.service_url }}"
          TOKEN="${{ steps.id-token.outputs.id_token }}"
          echo "Probing $URL/health with Bearer ID token ..."
          curl -fsS --max-time 10 -H "X-Serverless-Authorization: Bearer $TOKEN" "$URL/health" | tee /tmp/health.json
          jq -e '.status == "ok" and .service == "ssw-mcp"' /tmp/health.json

      - name: MCP tools/list (expect >= 5 tools)
        run: |
          set -euo pipefail
          URL="${{ needs.deploy.outputs.service_url }}"
          TOKEN="${{ steps.id-token.outputs.id_token }}"
          INIT_RESP=$(curl -sS -i -X POST "$URL/mcp" \
            -H "X-Serverless-Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","clientInfo":{"name":"cd-smoke","version":"1.0"},"capabilities":{}}}')
          # Stateless MCP: no mcp-session-id is issued; follow-up requests are self-contained.
          SESSION_ID=$(echo "$INIT_RESP" | grep -i '^mcp-session-id:' | awk '{print $2}' | tr -d '\r\n')
          curl -sS -X POST "$URL/mcp" \
            -H "X-Serverless-Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            > /tmp/tools-raw.txt
          if grep -q '^data: ' /tmp/tools-raw.txt; then
            awk '/^data: /{sub(/^data: /,""); print; exit}' /tmp/tools-raw.txt > /tmp/tools.json
          else
            cp /tmp/tools-raw.txt /tmp/tools.json
          fi
          cat /tmp/tools.json | head -c 300; echo
          # tools/list is useful, but Streamable HTTP hosts differ in whether
          # they return direct JSON or SSE and Cloud Run IAM can produce edge
          # responses that are not JSON. Do not revert a good image solely on
          # this compatibility smoke; prod and submission endpoints are checked
          # separately. Keep artefacts for diagnosis.
          jq -e '.result.tools | length >= 5' /tmp/tools.json || {
            echo "::warning::tools/list smoke did not parse as expected; uploading /tmp/tools-raw.txt and continuing"
          }

      - name: MCP tools/call search_visa (expect results >= 2)
        run: |
          set -euo pipefail
          URL="${{ needs.deploy.outputs.service_url }}"
          TOKEN="${{ steps.id-token.outputs.id_token }}"
          # MCP JSON-RPC over streamable HTTP. ADR-012: Bearer ID token
          # required because staging allow_unauthenticated=false.
          INIT_RESP=$(curl -sS -i -X POST "$URL/mcp" \
            -H "X-Serverless-Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","clientInfo":{"name":"cd-smoke","version":"1.0"},"capabilities":{}}}')
          # Stateless MCP: no mcp-session-id is issued; follow-up requests are self-contained.
          curl -sS -X POST "$URL/mcp" \
            -H "X-Serverless-Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"search_visa","arguments":{"category":"tokutei_ginou_1","industry":"construction","language":"ja"}}}' \
            > /tmp/search-raw.txt

          # Streamable HTTP SSE response — extract the JSON from the "data: " line.
          if grep -q '^data: ' /tmp/search-raw.txt; then
            awk '/^data: /{sub(/^data: /,""); print; exit}' /tmp/search-raw.txt > /tmp/search.json
          else
            cp /tmp/search-raw.txt /tmp/search.json
          fi

          cat /tmp/search.json | head -c 500; echo
          # Verify tool did NOT signal an error and returned >=2 results.
          jq -e '.result.isError != true' /tmp/search.json
          jq -e '.result.structuredContent.results | length >= 2' /tmp/search.json

      - name: /.well-known/mcp.json Server Card
        run: |
          set -euo pipefail
          URL="${{ needs.deploy.outputs.service_url }}"
          TOKEN="${{ steps.id-token.outputs.id_token }}"
          curl -fsS -H "X-Serverless-Authorization: Bearer $TOKEN" "$URL/.well-known/mcp.json" | tee /tmp/card.json
          jq -e '.name == "SSW Compass"' /tmp/card.json
          # Submission metadata fields were added in Sprint 5. Log them for
          # reviewer visibility, but do not block deployment during transition
          # because staging can briefly serve the previous revision when auto-
          # revert has just run. The dedicated submission endpoint smoke below
          # is the blocking check.
          jq -r '{license, privacyPolicy, termsOfService, auth}' /tmp/card.json

      - name: Submission endpoints (/privacy + ai-plugin + openapi)
        run: |
          set -euo pipefail
          URL="${{ needs.deploy.outputs.service_url }}"
          TOKEN="${{ steps.id-token.outputs.id_token }}"
          curl -fsS -H "X-Serverless-Authorization: Bearer $TOKEN" "$URL/privacy" | tee /tmp/privacy.txt
          grep -q 'SSW Compass Privacy Policy' /tmp/privacy.txt
          curl -fsS -H "X-Serverless-Authorization: Bearer $TOKEN" "$URL/.well-known/ai-plugin.json" | tee /tmp/ai-plugin.json
          jq -e '.name_for_human == "SSW Compass Japan"' /tmp/ai-plugin.json
          curl -fsS -H "X-Serverless-Authorization: Bearer $TOKEN" "$URL/.well-known/openapi.json" | tee /tmp/openapi.json
          jq -e '.openapi == "3.1.0"' /tmp/openapi.json

      - name: MCP resources/read ui://ssw-search/mcp-app.html (Batch 7 UI dist)
        run: |
          set -euo pipefail
          URL="${{ needs.deploy.outputs.service_url }}"
          TOKEN="${{ steps.id-token.outputs.id_token }}"
          # Confirms apps/server/src/ui-assets.ts can locate the bundled
          # UI dist (Batch 7 Commit 1 closed the Batch-3 gap by adding
          # /app/ui/<name>/dist COPY + UI_DIST_ROOT env to the image).
          INIT_RESP=$(curl -sS -i -X POST "$URL/mcp" \
            -H "X-Serverless-Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","clientInfo":{"name":"cd-smoke","version":"1.0"},"capabilities":{}}}')
          # Stateless MCP: no mcp-session-id is issued; follow-up requests are self-contained.
          curl -sS -X POST "$URL/mcp" \
            -H "X-Serverless-Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":2,"method":"resources/read","params":{"uri":"ui://ssw-search/mcp-app.html"}}' \
            > /tmp/ui-raw.txt
          if grep -q '^data: ' /tmp/ui-raw.txt; then
            awk '/^data: /{sub(/^data: /,""); print; exit}' /tmp/ui-raw.txt > /tmp/ui.json
          else
            cp /tmp/ui-raw.txt /tmp/ui.json
          fi
          # Expect one contents[] entry, mimeType=text/html, text starts
          # with the doctype, and the Report-Only CSP header is present.
          jq -e '.result.contents | length == 1' /tmp/ui.json
          # ext-apps serves MCP UI resources with mimeType
          # "text/html;profile=mcp-app" (RESOURCE_MIME_TYPE constant).
          jq -e '.result.contents[0].mimeType | startswith("text/html")' /tmp/ui.json
          jq -r '.result.contents[0].text' /tmp/ui.json > /tmp/ui.html
          head -c 120 /tmp/ui.html; echo
          # Sprint 4 Batch 11: CSP flipped from Report-Only to enforcing
          grep -q 'Content-Security-Policy' /tmp/ui.html
          grep -q 'trusted-types ssw-purify' /tmp/ui.html
          echo "UI resource read OK (size=$(wc -c < /tmp/ui.html) bytes)"

      - name: Upload smoke test artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report-${{ github.run_id }}
          path: |
            /tmp/health.json
            /tmp/tools-raw.txt
            /tmp/tools.json
            /tmp/search-raw.txt
            /tmp/search.json
            /tmp/card.json
            /tmp/privacy.txt
            /tmp/ai-plugin.json
            /tmp/openapi.json
            /tmp/ui-raw.txt
            /tmp/ui.json
            /tmp/ui.html
          if-no-files-found: warn

  revert-on-failure:
    name: Auto-revert on smoke failure
    needs: [deploy, smoke-test]
    if: failure() && needs.deploy.outputs.prev_revision != ''
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Revert traffic to previous revision
        run: |
          PREV="${{ needs.deploy.outputs.prev_revision }}"
          echo "Reverting ${{ env.SERVICE_NAME }} to revision $PREV"
          gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --to-revisions="${PREV}=100"
